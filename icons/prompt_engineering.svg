  <svg x="52" y="52" width="152" height="152" viewBox="0 0 24 24">
    <path d="M22 18H2V6h20v12zM4 16h16V8H4v8zm3-6l3 2-3 2v-2.3L4.8 11 7 9.7V10zm5 3h4v1.5h-4V13z" fill="#26A69A"/>
