<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" fill="none" viewBox="0 0 256 256">
  <defs>
    <!-- Dark glass-like gradient background -->
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2435"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </linearGradient>
    <!-- Brand glow border gradient -->
    <linearGradient id="glow_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00B0FF"/>
      <stop offset="100%" stop-color="#80D8FF"/>
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect width="256" height="256" fill="url(#bg_grad)" rx="60"/>
  
  <!-- Glowing Border Outline -->
  <rect x="4" y="4" width="248" height="248" rx="56" stroke="url(#glow_grad)" stroke-width="6" opacity="0.85"/>

  <!-- Centered Inner Icon -->
  <svg x="52" y="52" width="152" height="152" viewBox="0 0 24 24">
    <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm0 4h8v2H6v-2z" fill="#29B6F6"/>
  </svg>
</svg>