  </defs>

  <!-- Card Background -->
  <rect width="256" height="256" fill="url(#bg_grad)" rx="60"/>
  
  <!-- Glowing Border Outline -->
  <rect x="4" y="4" width="248" height="248" rx="56" stroke="url(#glow_grad)" stroke-width="6" opacity="0.85"/>

