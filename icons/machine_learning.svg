  <svg x="52" y="52" width="152" height="152" viewBox="0 0 24 24">
    <path d="M12 2C6.5 2 2 6.5 2 12c0 3.5 2 6.5 5 8.2V22h10v-1.8c3-1.7 5-4.7 5-8.2 0-5.5-4.5-10-10-10zm-3 15v-2h6v2H9zm3-4c-1.7 0-3-1.3-3-3s1.3-3 3-3 3 1.3 3 3-1.3 3-3 3z" fill="#00C853"/>
