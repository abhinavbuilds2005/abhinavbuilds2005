<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" fill="none" viewBox="0 0 256 256">
  <defs>
    <!-- Dark glass-like gradient background -->
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2435"/>
      <stop offset="100%" stop-color="#0b0e14"/>
    </linearGradient>
    <!-- Brand glow border gradient -->
    <linearGradient id="glow_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3D00"/>
      <stop offset="100%" stop-color="#FF8A80"/>
    </linearGradient>
  </defs>

  <!-- Card Background -->
  <rect width="256" height="256" fill="url(#bg_grad)" rx="60"/>
  
  <!-- Glowing Border Outline -->
  <rect x="4" y="4" width="248" height="248" rx="56" stroke="url(#glow_grad)" stroke-width="6" opacity="0.85"/>

  <!-- Centered Inner Icon -->
  <svg x="52" y="52" width="152" height="152" viewBox="0 0 24 24">
    
<circle cx="12" cy="5" r="3" fill="#FF5722"/>
<circle cx="5" cy="12" r="3" fill="#FF5722"/>
<circle cx="12" cy="19" r="3" fill="#FF5722"/>
<circle cx="19" cy="12" r="3" fill="#FF5722"/>
<line x1="12" y1="5" x2="5" y2="12" stroke="#FF5722" stroke-width="2"/>
<line x1="12" y1="5" x2="12" y2="19" stroke="#FF5722" stroke-width="2"/>
<line x1="12" y1="5" x2="19" y2="12" stroke="#FF5722" stroke-width="2"/>
<line x1="5" y1="12" x2="12" y2="19" stroke="#FF5722" stroke-width="2"/>
<line x1="19" y1="12" x2="12" y2="19" stroke="#FF5722" stroke-width="2"/>
<line x1="5" y1="12" x2="19" y2="12" stroke="#FF5722" stroke-width="2"/>

  </svg>
</svg>